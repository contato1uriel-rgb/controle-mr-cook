<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <title>Novo Produto - Controle de Produção</title>
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            margin: 0;
            padding: 0;
            background: #020617;
            color: #e5e7eb;
        }

        header {
            padding: 16px 24px;
            background: #020617;
            border-bottom: 1px solid #1f2937;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        main {
            padding: 24px;
            max-width: 560px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            margin-bottom: 4px;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 8px 10px;
            border-radius: 6px;
            border: 1px solid #1f2937;
            background: #020617;
            color: #e5e7eb;
            font-size: 0.9rem;
            box-sizing: border-box;
            margin-bottom: 10px;
        }

        textarea {
            min-height: 80px;
        }

        .actions {
            margin-top: 12px;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        button {
            padding: 8px 14px;
            border-radius: 999px;
            border: none;
            background: #2563eb;
            color: #e5e7eb;
            font-size: 0.85rem;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        a {
            color: #9ca3af;
            font-size: 0.8rem;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header>
        <div>
            <strong>Novo produto</strong>
        </div>
        <div>
            <a href="{% url 'lista_produtos' %}">Voltar para lista</a>
        </div>
    </header>

    <main>
        <form method="post">
            {% csrf_token %}
            <label for="codigo">Código</label>
            <input type="text" id="codigo" name="codigo" required />

            <label for="nome">Nome</label>
            <input type="text" id="nome" name="nome" required />

            <label for="descricao">Descrição</label>
            <textarea id="descricao" name="descricao"></textarea>

            <label>
                <input type="checkbox" name="ativo" checked />
                Produto ativo
            </label>

            <div class="actions">
                <button type="submit">Salvar</button>
                <a href="{% url 'lista_produtos' %}">Cancelar</a>
            </div>
        </form>
    </main>
</body>
</html>
