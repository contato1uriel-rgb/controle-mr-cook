{# Faixa conceitual: SVG integrado. Opcional: camada img estatica em producao/img/ #}
<div class="concept-banner" role="img" aria-label="Arte de ambiente: garrafa, fumaça e elementos gráficos">
    <div class="concept-banner__layer concept-banner__layer--svg" aria-hidden="true">
        <svg class="concept-banner__art" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 200" preserveAspectRatio="xMidYMid slice">
            <defs>
                <linearGradient id="cb-smokeP" x1="0" y1="0" x2="1" y2="1">
                    <stop offset="0%" stop-color="#6366f1" stop-opacity="0.75"/>
                    <stop offset="55%" stop-color="#4f46e5" stop-opacity="0.55"/>
                    <stop offset="100%" stop-color="#1a0520" stop-opacity="0"/>
                </linearGradient>
                <linearGradient id="cb-smokeP2" x1="1" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="#4f46e5" stop-opacity="0.55"/>
                    <stop offset="100%" stop-color="#120018" stop-opacity="0"/>
                </linearGradient>
                <radialGradient id="cb-liquid" cx="50%" cy="65%" r="55%">
                    <stop offset="0%" stop-color="#93c5fd" stop-opacity="0.85"/>
                    <stop offset="45%" stop-color="#60a5fa" stop-opacity="0.65"/>
                    <stop offset="100%" stop-color="#1e3a8a" stop-opacity="0.25"/>
                </radialGradient>
                <radialGradient id="cb-glow" cx="50%" cy="40%" r="60%">
                    <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.28"/>
                    <stop offset="100%" stop-color="#c8ff00" stop-opacity="0"/>
                </radialGradient>
                <filter id="cb-blur" x="-30%" y="-30%" width="160%" height="160%">
                    <feGaussianBlur stdDeviation="14"/>
                </filter>
                <filter id="cb-blur-soft" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="6"/>
                </filter>
            </defs>
            <path fill="url(#cb-smokeP)" filter="url(#cb-blur)" opacity="0.55" d="M40,120 Q80,40 180,70 Q240,20 320,80 Q280,140 200,150 Q100,160 40,120Z"/>
            <path fill="url(#cb-smokeP2)" filter="url(#cb-blur)" opacity="0.5" d="M1180,100 Q1240,20 1320,60 Q1380,90 1360,140 Q1280,180 1200,150 Q1140,130 1180,100Z"/>
            <ellipse cx="220" cy="95" rx="90" ry="55" fill="#6366f1" filter="url(#cb-blur-soft)" opacity="0.35"/>
            <ellipse cx="1180" cy="88" rx="100" ry="62" fill="#4f46e5" filter="url(#cb-blur-soft)" opacity="0.30"/>
            <!-- Pontos/figura do "MC" removidos para evitar elementos estranhos no cabeçalho -->
            <g transform="translate(380, 118)">
                <ellipse cx="0" cy="0" rx="28" ry="32" fill="#ddd5c8" stroke="#0a0a0a" stroke-width="3"/>
                <circle cx="-10" cy="-4" r="5" fill="#0a0a0a"/><circle cx="10" cy="-4" r="5" fill="#0a0a0a"/>
                <path d="M-14,14 Q0,22 14,14" fill="none" stroke="#0a0a0a" stroke-width="2.5" stroke-linecap="round"/>
            </g>
            <g transform="translate(980, 122)">
                <ellipse cx="0" cy="0" rx="26" ry="30" fill="#ddd5c8" stroke="#0a0a0a" stroke-width="3"/>
                <circle cx="-9" cy="-3" r="4.5" fill="#0a0a0a"/><circle cx="9" cy="-3" r="4.5" fill="#0a0a0a"/>
                <path d="M-12,12 Q0,20 12,12" fill="none" stroke="#0a0a0a" stroke-width="2.2" stroke-linecap="round"/>
            </g>
            <path fill="none" stroke="#93c5fd" stroke-width="2" opacity="0.22" filter="url(#cb-blur-soft)" d="M480,160 Q520,100 560,130 T640,120"/>
            <path fill="none" stroke="#6366f1" stroke-width="2" opacity="0.20" d="M760,40 Q800,90 840,50"/>
        </svg>
    </div>
    <div class="concept-banner__grain" aria-hidden="true"></div>
</div>
