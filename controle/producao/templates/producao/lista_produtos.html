<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <title>Produtos - Controle de Produção</title>
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            margin: 0;
            padding: 0;
            background: #020617;
            color: #e5e7eb;
        }

        header {
            padding: 16px 24px;
            background: #020617;
            border-bottom: 1px solid #1f2937;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        a {
            color: #60a5fa;
            text-decoration: none;
            font-size: 0.85rem;
        }

        a:hover {
            text-decoration: underline;
        }

        main {
            padding: 24px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        th, td {
            padding: 8px 6px;
            border-bottom: 1px solid #111827;
            text-align: left;
        }

        th {
            color: #9ca3af;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <header>
        <div>
            <strong>Produtos</strong>
        </div>
        <div>
            <a href="{% url 'home' %}">Início</a> |
            <a href="{% url 'novo_produto' %}">Novo produto</a>
        </div>
    </header>

    <main>
        {% if produtos %}
            <table>
                <thead>
                    <tr>
                        <th>Código</th>
                        <th>Nome</th>
                        <th>Ativo</th>
                        <th>Descrição</th>
                    </tr>
                </thead>
                <tbody>
                    {% for produto in produtos %}
                        <tr>
                            <td>{{ produto.codigo }}</td>
                            <td>{{ produto.nome }}</td>
                            <td>{{ produto.ativo|yesno:"Sim,Não" }}</td>
                            <td>{{ produto.descricao }}</td>
                        </tr>
                    {% endfor %}
                </tbody>
            </table>
        {% else %}
            <p>Nenhum produto cadastrado.</p>
        {% endif %}
    </main>
</body>
</html>
