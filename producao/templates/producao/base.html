<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}CONTROLE MR. COOK{% endblock %}</title>
    <style>
        :root {
            --bg: #f7f7f8;
            --panel: #ffffff;
            --panel2: #fcfcfd;
            --text: #0b0f1a;
            --muted: #5b6473;
            --border: #e6e8ee;
            --shadow: 0 14px 40px rgba(0, 0, 0, 0.08);
            --primary: #ef4444;
            --primary2: #fb923c;
            --ok: #16a34a;
            --focus: rgba(239, 68, 68, 0.25);
        }

        html[data-theme="dark"] {
            --bg: #070a11;
            --panel: #0b1020;
            --panel2: #0a0f1e;
            --text: #eef2ff;
            --muted: #98a2b3;
            --border: rgba(148, 163, 184, 0.16);
            --shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
            --primary: #fb7185;
            --primary2: #fdba74;
            --ok: #22c55e;
            --focus: rgba(251, 113, 133, 0.25);
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: radial-gradient(1200px 700px at 10% -10%, rgba(251, 146, 60, 0.10), transparent 55%),
                        radial-gradient(1000px 600px at 90% 0%, rgba(239, 68, 68, 0.10), transparent 50%),
                        var(--bg);
            color: var(--text);
        }

        a { color: inherit; }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 50;
            border-bottom: 1px solid var(--border);
            background: color-mix(in srgb, var(--panel) 92%, transparent);
            backdrop-filter: blur(12px);
        }

        .topbar-inner {
            max-width: 1100px;
            margin: 0 auto;
            padding: 14px 18px;
            display: flex;
            gap: 14px;
            align-items: center;
            justify-content: space-between;
        }

        .brand {
            display: flex;
            flex-direction: column;
            line-height: 1.05;
            text-decoration: none;
        }
        .brand strong {
            letter-spacing: 0.08em;
            font-size: 0.95rem;
        }
        .brand span {
            color: var(--muted);
            font-size: 0.78rem;
            margin-top: 4px;
        }

        .nav {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: flex-end;
        }

        .nav a {
            text-decoration: none;
            font-size: 0.82rem;
            padding: 8px 10px;
            border-radius: 999px;
            border: 1px solid transparent;
            color: var(--muted);
        }
        .nav a[aria-current="page"] {
            color: var(--text);
            border-color: var(--border);
            background: var(--panel2);
        }
        .nav a:hover {
            color: var(--text);
            border-color: var(--border);
            background: var(--panel2);
        }

        .theme-btn {
            border: 1px solid var(--border);
            background: var(--panel2);
            color: var(--text);
            border-radius: 999px;
            padding: 8px 10px;
            font-size: 0.82rem;
            cursor: pointer;
        }
        .theme-btn:focus {
            outline: 3px solid var(--focus);
            outline-offset: 2px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 22px 18px 40px;
        }

        .card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: var(--shadow);
            padding: 18px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1.6fr 1fr;
            gap: 18px;
        }
        @media (max-width: 920px) {
            .grid { grid-template-columns: 1fr; }
        }

        .muted { color: var(--muted); }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 14px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: var(--panel2);
            text-decoration: none;
            font-size: 0.86rem;
            color: var(--text);
            cursor: pointer;
        }
        .btn:hover { filter: brightness(0.98); }

        .btn-primary {
            border-color: transparent;
            background: linear-gradient(90deg, var(--primary), var(--primary2));
            color: white;
        }

        .footer {
            border-top: 1px solid var(--border);
            margin-top: 24px;
            padding: 18px 0 30px;
            color: var(--muted);
            font-size: 0.78rem;
        }
        .footer a { color: inherit; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <div class="topbar">
        <div class="topbar-inner">
            <a class="brand" href="{% url 'home' %}">
                <strong>CONTROLE MR. COOK</strong>
                <span>{% block subtitle %}Painel industrial • Relações • Impressão{% endblock %}</span>
            </a>

            <nav class="nav" aria-label="Navegação principal">
                <a href="{% url 'home' %}" {% if request.resolver_match.url_name == 'home' %}aria-current="page"{% endif %}>Painel</a>
                <a href="{% url 'relacoes' %}" {% if request.resolver_match.url_name|default:''|slice:":7" == 'relacao' or request.path|slice:":9" == '/relacoes' %}aria-current="page"{% endif %}>Relações</a>
                <a href="{% url 'controle_producao_login' %}" {% if request.resolver_match.url_name == 'controle_producao_login' %}aria-current="page"{% endif %}>Controle de Produção</a>
                <a href="{% url 'pintura_epox' %}" {% if request.resolver_match.url_name == 'pintura_epox' %}aria-current="page"{% endif %}>Pintura Epox</a>
                <button class="theme-btn" type="button" id="themeToggle">Tema</button>
            </nav>
        </div>
    </div>

    <div class="container">
        {% block content %}{% endblock %}

        <div class="footer">
            <a href="https://adaptive.ai/" target="_blank" rel="noreferrer noopener">Powered by Adaptive</a>
        </div>
    </div>

    <script>
        (function () {
            const KEY = "cmc_theme";
            const root = document.documentElement;
            const btn = document.getElementById("themeToggle");

            function apply(theme) {
                root.setAttribute("data-theme", theme);
                btn.textContent = theme === "dark" ? "Claro" : "Escuro";
            }

            const saved = localStorage.getItem(KEY);
            if (saved === "dark" || saved === "light") apply(saved);
            else apply(window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");

            btn.addEventListener("click", function () {
                const current = root.getAttribute("data-theme") === "dark" ? "dark" : "light";
                const next = current === "dark" ? "light" : "dark";
                localStorage.setItem(KEY, next);
                apply(next);
            });
        })();
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
