<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <title>Nova Ordem de Produção - Controle</title>
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            margin: 0;
            padding: 0;
            background: #020617;
            color: #e5e7eb;
        }

        header {
            padding: 16px 24px;
            background: #020617;
            border-bottom: 1px solid #1f2937;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        main {
            padding: 24px;
            max-width: 560px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            margin-bottom: 4px;
        }

        input[type="text"],
        input[type="number"],
        input[type="date"],
        textarea,
        select {
            width: 100%;
            padding: 8px 10px;
            border-radius: 6px;
            border: 1px solid #1f2937;
            background: #020617;
            color: #e5e7eb;
            font-size: 0.9rem;
            box-sizing: border-box;
            margin-bottom: 10px;
        }

        textarea {
            min-height: 80px;
        }

        .actions {
            margin-top: 12px;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        button {
            padding: 8px 14px;
            border-radius: 999px;
            border: none;
            background: #2563eb;
            color: #e5e7eb;
            font-size: 0.85rem;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        a {
            color: #9ca3af;
            font-size: 0.8rem;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header>
        <div>
            <strong>Nova ordem de produção</strong>
        </div>
        <div>
            <a href="{% url 'lista_ordens' %}">Voltar para lista</a>
        </div>
    </header>

    <main>
        <form method="post">
            {% csrf_token %}
            <label for="numero">Número da OP</label>
            <input type="text" id="numero" name="numero" required />

            <label for="produto">Produto</label>
            <select id="produto" name="produto" required>
                <option value="">Selecione...</option>
                {% for produto in produtos %}
                    <option value="{{ produto.id }}">{{ produto.codigo }} - {{ produto.nome }}</option>
                {% endfor %}
            </select>

            <label for="quantidade">Quantidade</label>
            <input type="number" step="0.01" id="quantidade" name="quantidade" required />

            <label for="data_prevista">Data prevista</label>
            <input type="date" id="data_prevista" name="data_prevista" />

            <label for="observacoes">Observações</label>
            <textarea id="observacoes" name="observacoes"></textarea>

            <div class="actions">
                <button type="submit">Salvar</button>
                <a href="{% url 'lista_ordens' %}">Cancelar</a>
            </div>
        </form>
    </main>
</body>
</html>
